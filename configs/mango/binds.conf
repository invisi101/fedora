# =============================================
# Keybinds (matched to Niri where possible)
# =============================================

# Apps
bind=SUPER,Return,spawn,kitty --instance-group mango --config ~/.config/kitty/kitty.conf
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER+ALT,e,spawn,rofimoji --action copy
bind=SUPER,e,spawn,nautilus --new-window
bind=SUPER,b,spawn,brave-browser
bind=SUPER,n,spawn,$HOME/.local/bin/standard-notes
bind=SUPER,z,spawn,kitty --instance-group mango --config ~/.config/kitty/kitty.conf -e yazi
bind=SUPER,t,spawn,mousepad
bind=SUPER+ALT,m,spawn,brave-browser --profile-directory=Default --app-id=jnpecgipniidlgicjocehkhajgdnjekh
bind=SUPER+ALT,p,spawn,brave-browser --profile-directory=Default --app-id=hkhckfoofhljcngmlnlojcbplgkcpcab
bind=SUPER+ALT,Return,spawn,kitty --instance-group mango --config ~/.config/kitty/kitty.conf -e tmux
bind=SUPER+ALT,a,spawn,kitty --instance-group mango --config ~/.config/kitty/kitty.conf -e zsh -ic cx
bind=SUPER+SHIFT,Return,spawn,kitty --class kitty-float --instance-group mango --config ~/.config/kitty/kitty.conf -e env NOFASTFETCH=1 zsh
bind=SUPER+ALT,l,spawn,swaylock
bind=SUPER+ALT,y,spawn,freetube
bind=SUPER+ALT,v,spawn,$HOME/.local/bin/clipboard-rofi

# Window
bind=SUPER,w,killclient
bind=SUPER,f,togglemaximizescreen
bind=SUPER+SHIFT,f,togglefullscreen
bind=SUPER,s,togglefloating
bind=SUPER,m,minimized,
binds=SUPER+SHIFT,m,spawn_shell,mmsg -d restore_minimized && sleep 0.05 && mmsg -d togglefloating
bind=SUPER,g,toggleglobal,
bind=SUPER,y,toggleoverlay,
bind=SUPER,p,toggle_scratchpad
bind=SUPER,x,toggleoverview
bind=SUPER,o,focusstack,next

# reload config
bind=SHIFT+ALT,r,reload_config

# Quit
bind=SUPER+SHIFT,e,quit
bind=CTRL+ALT,Delete,quit

# Focus (arrows)
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Focus (vim)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# Move window (arrows)
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Move window (vim)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# Workspaces focus
bind=SUPER,1,comboview,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Workspaces move window
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Toggle tag on window
bind=SUPER+CTRL,1,toggletag,1,0
bind=SUPER+CTRL,2,toggletag,2,0
bind=SUPER+CTRL,3,toggletag,3,0
bind=SUPER+CTRL,4,toggletag,4,0
bind=SUPER+CTRL,5,toggletag,5,0
bind=SUPER+CTRL,6,toggletag,6,0
bind=SUPER+CTRL,7,toggletag,7,0
bind=SUPER+CTRL,8,toggletag,8,0
bind=SUPER+CTRL,9,toggletag,9,0

# Workspace nav
bind=SUPER,bracketleft,viewtoleft,0
bind=SUPER,bracketright,viewtoright,0
bind=SUPER+SHIFT,bracketleft,tagtoleft,0
bind=SUPER+SHIFT,bracketright,tagtoright,0

# Layout
bind=ALT,space,switch_layout

# Scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# Monitor switching
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+SHIFT,comma,tagmon,left
bind=SUPER+SHIFT,period,tagmon,right

# Gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1

# Move floating window
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# Resize window
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Screen zoom
bind=SUPER+ALT,equal,spawn_shell,wlr-randr --output eDP-1 --scale 1.5
bind=SUPER+ALT,minus,spawn_shell,wlr-randr --output eDP-1 --scale 1.1

# Screensaver
bind=SUPER+SHIFT,s,spawn,$HOME/.local/bin/mango-launch-screensaver

# Screenshots
bind=NONE,Print,spawn,$HOME/.local/bin/screenshot-satty
bind=CTRL,Print,spawn,$HOME/.local/bin/screenshot-full
bind=SUPER+SHIFT,c,spawn,hyprpicker -a

# Media
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioStop,spawn,playerctl stop
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 10%-

# Mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=NONE,btn_right,killclient,0

# Scroll
axisbind=SUPER,UP,viewtoright_have_client
axisbind=SUPER,DOWN,viewtoleft_have_client

# 3-finger: Window focus
gesturebind=none,right,3,focusdir,left
gesturebind=none,left,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down

# 4-finger: Workspace navigation
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
