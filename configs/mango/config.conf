# More option see https://github.com/DreamMaoMao/mango/wiki/

# Autostart — single wrapper so we get a log at ~/.config/mango/autostart.log
exec-once=$HOME/.config/mango/autostart.sh

#monitor monitorrule=name:Values,Parameter:Values,Parameter:Values
# NOTE: adjust for your display if hardware changes
monitorrule=name:eDP-1,width:1920,height:1200,refresh:60,scale:1.1

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.5
blur_params_contrast = 0.8
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 1
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=2
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.5

# Animation
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=300
animation_duration_open=300
animation_duration_tag=350
animation_duration_close=300
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# Keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0

# Appearance
gappih=3
gappiv=3
gappoh=3
gappov=7
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2

# Layout rules
tagrule=id:1,no_hide:1,layout_name:tile
tagrule=id:2,no_hide:1,layout_name:scroller
tagrule=id:3,no_hide:1,layout_name:scroller
tagrule=id:4,no_hide:1,layout_name:scroller
tagrule=id:5,no_hide:1,layout_name:scroller
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Window rules
windowrule=isfloating:1,appid:org.gnome.NautilusPreviewer
windowrule=isfloating:1,width:900,height:600,appid:kitty-float
windowrule=isfullscreen:1,isnoborder:1,noblur:1,isnoradius:1,isnoshadow:1,appid:org.omarchy.screensaver

# Layer rules
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# Keybinds
source = $HOME/.config/mango/binds.conf

# DMS-managed display settings
source=./dms/cursor.conf
source=./dms/outputs.conf
